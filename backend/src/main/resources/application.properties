spring.application.name=Real Estate
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}


# Multipart file upload limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=200MB
server.tomcat.max-part-count=1000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.community-db-support-enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=public
spring.flyway.default-schema=public
spring.flyway.out-of-order=false
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true
spring.flyway.table=flyway_schema_history
spring.flyway.connect-retries=5
spring.flyway.connect-retries-interval=10


# Logging defaults
spring.mvc.log-request-details=false
spring.web.error.include-stacktrace=never


management.endpoints.web.exposure.include=health,info

server.address=0.0.0.0
server.port=8080

# JWT TTLs (seconds)
# 24 hours
security.jwt.access-ttl-seconds=86400

# 14 days
security.jwt.refresh-ttl-seconds=1209600

# CORS (production domains only)
security.cors.allowed-origins=https://realestate.ysminfosolution.com,http://localhost:3000,https://real-estate-crm-virid.vercel.app


# S3
cloud.aws.region=ap-south-1
app.s3.bucket=${AWS_S3_BUCKET:realestate-ysm-storage}
