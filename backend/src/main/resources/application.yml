spring:
  application:
    name: "Real Estate"
  profiles:
    default: dev

  # File upload configuration
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 200MB

  # JPA and Hibernate configuration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false

  # Flyway configuration for database migrations
  flyway:
    enabled: true
    community-db-support-enabled: true
    locations: "classpath:db/migration"
    schemas: public
    default-schema: public
    out-of-order: false
    validate-on-migrate: true
    clean-disabled: true
    table: flyway_schema_history
    connect-retries: 5
    connect-retries-interval: 10

  # Logging configuration
  mvc:
    log-request-details: false
  web:
    error:
      include-stacktrace: never
  devtools:
    restart:
      enabled: false
    livereload:
      enabled: false

  # Datasource configuration
  datasource:
    url: "${SPRING_DATASOURCE_URL}"
    username: "${SPRING_DATASOURCE_USERNAME}"
    password: "${SPRING_DATASOURCE_PASSWORD}"
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: RealEstateHikariPool
      maximum-pool-size: 4
      minimum-idle: 1
      connection-timeout: 2000
      idle-timeout: 300000
      max-lifetime: 1200000
      validation-timeout: 1000
      keepalive-time: 300000
      leak-detection-threshold: 15000

  # Cache configuration using Caffeine
  cache:
    type: caffeine
    caffeine:
      spec: "maximumSize=1000,expireAfterAccess=10m"

# Management endpoints configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info

# Server configuration
server:
  address: 0.0.0.0
  port: 8080
  tomcat:
    max-part-count: 1000

# Application-specific configuration
security:
  jwt:
    access-ttl-seconds: 86400
    refresh-ttl-seconds: 1209600
    secret: "${REALESTATE_JWT_SECRET}"
  cors:
    allowed-origins: "https://realestate.ysminfosolution.com,http://localhost:3000,https://real-estate-crm-virid.vercel.app"

# AWS S3 configuration
cloud:
  aws:
    region: ap-south-1

app:
  s3:
    bucket: "${AWS_S3_BUCKET:realestate-ysm-storage}"

# Logging configuration
logging:
  level:
    root: INFO
    "[com.ysminfosolution]": INFO
    "[org.springframework.web]": INFO
    "[org.springframework.web.servlet.DispatcherServlet]": WARN
    "[org.hibernate.SQL]": DEBUG
    "[org.hibernate.type.descriptor.sql.BasicBinder]": DEBUG
    "[org.springframework.cache]": INFO
    "[org.hibernate.engine.transaction.internal]": WARN
    "[org.hibernate.engine.jdbc.spi.SqlExceptionHelper]": ERROR

# Real Estate specific configuration
realestate:
  base:
    directory: "${REALESTATE_BASE_DIRECTORY}"
