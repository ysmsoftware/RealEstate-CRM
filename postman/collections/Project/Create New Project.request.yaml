  - type: beforeRequest
    code: "// Function to generate random string\r

      function randomString(length) {\r

      \    const chars =
      'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';\r

      \    let result = '';\r

      \    for (let i = 0; i < length; i++) {\r

      \        result += chars.charAt(Math.floor(Math.random() *
      chars.length));\r

      \    }\r

      \    return result;\r

      }\r

      \r

      // Set mahareraNo as an environment variable\r

      pm.environment.set(\"mahareraNo\", randomString(10));\r\n"
