$kind: http-request
url: "{{base_url}}/{{project_id}}"
method: POST
body:
  type: json
  content: "{\r

    \    \"amenityName\":\"Something\"\r

    }\r\n"
scripts:
  - type: afterResponse
    code: "pm.test(\"Successful POST request\", function () {\r

      \    pm.expect(pm.response.code).to.be.oneOf([200, 201]);\r

      });\r

      \r

      // Update the global amenity Id\r

      pm.collectionVariables.set(\"amenity_id\", pm.response.json().amenityId);"
    language: text/javascript
order: 3000
