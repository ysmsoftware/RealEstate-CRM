$kind: http-request
url: "{{base_url}}/{{project_id}}"
method: POST
body:
  type: json
  content: "{\r

    \    \"bankName\": \"SBI\",\r

    \    \"branchName\": \"Ojhar\",\r

    \    \"contactPerson\": \"Nyaz\",\r

    \    \"contactNumber\": \"8551055201\"\r

    }\r\n"
scripts:
  - type: afterResponse
    code: "pm.test(\"Successful POST request\", function () {\r

      \    pm.expect(pm.response.code).to.be.oneOf([200, 201]);\r

      });\r

      \r

      // Update the selected environment bank project info Id\r

      pm.environment.set(\"bank_project_info_id\",
      pm.response.json().bankProjectInfoId);\r\n"
    language: text/javascript
order: 3000
